server {
    listen 80;
    listen [::]:80;
    server_name os.ironhousecivil.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        add_header Retry-After "300" always;
        return 503 "Iron House OS maintenance in progress.\n";
    }
}
