name: Release readiness

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.production.yml"
      - ".env.production.example"
      - "scripts/**"
      - "ops/**"
      - ".github/workflows/release-readiness.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.production.yml"
      - ".env.production.example"
      - "scripts/**"
      - "ops/**"
      - ".github/workflows/release-readiness.yml"

permissions:
  contents: read

jobs:
  backend:
    name: Release backend gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint backend
        run: ruff check .
      - name: Test backend
        run: pytest

  frontend:
    name: Release frontend gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Build frontend
        run: npm run build

  browser-release-gate:
    name: Release browser, mobile, and accessibility gate
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Build production frontend
        run: npm run build
      - name: Run browser release gate
        run: npm run test:e2e

  production-stack:
    name: Production stack smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend, browser-release-gate]
    timeout-minutes: 25
    env:
      POSTGRES_DB: iron_house_os
      POSTGRES_USER: iron_house
      POSTGRES_PASSWORD: build-207-ci-database-password
      SECRET_KEY: build-207-ci-secret-key-at-least-32-characters
      BOOTSTRAP_ADMIN_EMAIL: build209@ironhousecivil.com
      BOOTSTRAP_ADMIN_PASSWORD: build-209-ci-login-password
      BOOTSTRAP_ADMIN_NAME: Build 209 Release User
      SESSION_COOKIE_SECURE: "false"
      IHOS_PORT: "8080"
    steps:
      - uses: actions/checkout@v4
      - name: Validate production configuration
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - name: Validate Build 216 host assets
        run: |
          bash -n ops/digitalocean/cutover.sh scripts/verify_s3_targets.sh scripts/upload_backup_s3.sh
          docker run --rm \
            -v "$PWD/ops/digitalocean/nginx-maintenance.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t
      - name: Start production stack
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml up -d --build --wait
      - name: Prove Build 208 PostgreSQL upgrade
        run: |
          database_url="postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ihos_build_208_upgrade"
          docker compose --env-file .env.production.example -f docker-compose.production.yml \
            exec -T postgres createdb -U "$POSTGRES_USER" ihos_build_208_upgrade
          docker compose --env-file .env.production.example -f docker-compose.production.yml \
            run --rm --no-deps -T -e DATABASE_URL="$database_url" -e PYTHONPATH=/app \
            -v "$PWD/scripts:/recovery-scripts:ro" \
            backend python /recovery-scripts/build_208_upgrade_probe.py create
          docker compose --env-file .env.production.example -f docker-compose.production.yml \
            run --rm --no-deps -T -e DATABASE_URL="$database_url" -e PYTHONPATH=/app \
            backend alembic upgrade head
          docker compose --env-file .env.production.example -f docker-compose.production.yml \
            run --rm --no-deps -T -e DATABASE_URL="$database_url" -e PYTHONPATH=/app \
            -v "$PWD/scripts:/recovery-scripts:ro" \
            backend python /recovery-scripts/build_208_upgrade_probe.py verify
      - name: Run full release smoke path
        run: >-
          python scripts/release_smoke.py
          --base-url http://127.0.0.1:8080
          --email "$BOOTSTRAP_ADMIN_EMAIL"
          --password "$BOOTSTRAP_ADMIN_PASSWORD"
          --full
      - name: Create recovery sentinel
        run: >-
          python scripts/recovery_probe.py create
          --base-url http://127.0.0.1:8080
          --email "$BOOTSTRAP_ADMIN_EMAIL"
          --password "$BOOTSTRAP_ADMIN_PASSWORD"
          --output /tmp/ihos-recovery-probe.json
      - name: Back up production data
        env:
          IHOS_COMPOSE_FILE: docker-compose.production.yml
          IHOS_COMPOSE_ENV_FILE: .env.production.example
          IHOS_BACKUP_ROOT: /tmp/ihos-scheduled-backups
          IHOS_BACKUP_NAME: release-readiness
          IHOS_BACKUP_RETENTION_DAYS: "30"
          IHOS_BACKUP_KEEP_MINIMUM: "1"
          IHOS_BACKUP_MAXIMUM_BUNDLES: "3"
        run: scripts/scheduled_backup.sh
      - name: Restore production data into the disposable stack
        env:
          IHOS_COMPOSE_FILE: docker-compose.production.yml
          IHOS_COMPOSE_ENV_FILE: .env.production.example
          IHOS_BASE_URL: http://127.0.0.1:8080
        run: >-
          scripts/restore.sh
          --backup /tmp/ihos-scheduled-backups/release-readiness
          --confirm-restore
          --skip-safety-backup
      - name: Verify restored database and upload
        run: >-
          python scripts/recovery_probe.py verify
          --base-url http://127.0.0.1:8080
          --email "$BOOTSTRAP_ADMIN_EMAIL"
          --password "$BOOTSTRAP_ADMIN_PASSWORD"
          --input /tmp/ihos-recovery-probe.json
      - name: Build release-candidate evidence
        run: >-
          python scripts/release_candidate_evidence.py
          --output release-candidate-evidence
          --release-id "$GITHUB_SHA"
          --gate ci=passed
          --gate browser_mobile_accessibility=passed
          --gate production_stack_smoke=passed
          --gate backup_restore=passed
      - name: Upload release-candidate evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-evidence-${{ github.sha }}
          path: release-candidate-evidence
          if-no-files-found: error
          retention-days: 30
      - name: Show production logs on failure
        if: failure()
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml logs --no-color
      - name: Stop production stack
        if: always()
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml down --volumes
