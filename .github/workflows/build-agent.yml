name: Iron House Build Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1-5"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run Build Agent
        run: python automation/iron_house_build_agent.py

      - name: Show Build Agent output
        run: |
          if [ -f automation/build-agent-output.json ]; then
            cat automation/build-agent-output.json
          fi
